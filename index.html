<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Singh ji 💖</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    min-height:100vh;
    background-image: url("./r.jpeg");          
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Poppins', sans-serif;
    overflow:hidden;
}

/* Card */
.proposal-card{
    background: linear-gradient(135deg,#ff758c63,#ce99af);
    backdrop-filter: blur(14px);
    border-radius:25px;
    padding:40px;
    text-align:center;
    color:#fff;
    box-shadow:0 30px 70px rgba(0, 0, 0, 0.826);
    max-width:420px;
    animation: fadeIn 1s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:scale(0.8);}
    to{opacity:1; transform:scale(1);}
}

h1{
    font-weight:700;
}

button{
    border-radius:30px;
    padding:12px 30px;
    font-size:18px;
    margin:10px;
}

/* Hearts */
.heart{
    position:absolute;
    font-size:22px;
    animation: float 5s linear infinite;
}

@keyframes float{
    0%{transform:translateY(0);opacity:1;}
    100%{transform:translateY(-100vh);opacity:0;}
}
</style>
</head>

<body>

<div class="proposal-card">
    <h1>💖 Dear Gaupu💖</h1>

    <p class="fs-5 mt-3">
        Kitna pyar hai tumse,<br>
        yeh jaan lo ✨
    </p>

    <p class="fs-5">
        Tum hi zindagi ho ,<br>
        Is baat ko maan lo 💕
    </p>

    <p class="fs-4 fw-bold">
        Tumhe dene ke liye ,kuchh bhi nahi mere pass  
    </p>

     <p class="fs-4 fw-bold">
       Baas ek jaan hai ,Jab jee chahe maang lo....!!! 
    </p>

    
     <p class="fs-4 fw-bold">
      Do you Love me ....!!! 
      Gaupu, kya tum mere saath zindagi bhar rahoge....!!!!? 💍
    </p>

    <button class="btn btn-success" onclick="yes()">Yes 💖</button>
    <button class="btn btn-danger" id="noBtn" onclick="moveNo()">No 🙈</button>

    <h4 id="result" class="mt-4"></h4>
</div>

<script>
function yes(){
    document.getElementById("result").innerHTML =
        "🥰 Yayyy Goutam! I Love You Forever 💖💍";
    hearts();
}

function moveNo(){
    let btn = document.getElementById("noBtn");
    btn.style.position = "absolute";
    btn.style.left = Math.random()*80 + "%";
    btn.style.top = Math.random()*80 + "%";
}

function hearts(){
    for(let i=0;i<25;i++){
        let h = document.createElement("div");
        h.innerHTML = "💖";
        h.className = "heart";
        h.style.left = Math.random()*100 + "vw";
        h.style.bottom = "0px";
        h.style.animationDuration = (3 + Math.random()*3) + "s";
        document.body.appendChild(h);
        setTimeout(()=>h.remove(),6000);
    }
}
</script>

</body>
</html>
